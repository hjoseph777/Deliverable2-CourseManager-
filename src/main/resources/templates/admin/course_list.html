<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Course Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <!-- Use layout fragment for navbar -->
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mt-4">
        <div class="row mb-3 align-items-center">
            <div class="col">
                <h2 class="text-warning"><i class="bi bi-shield-lock-fill"></i> Admin Panel: Course Management</h2>
            </div>
        </div>

        <div th:if="${param.success}" class="alert alert-success mt-3">
            Course updated successfully!
        </div>
        <div th:if="${param.deleted}" class="alert alert-warning mt-3">
            Course deleted successfully.
        </div>

        <div class="card shadow-sm border-warning">
            <div class="card-header bg-warning text-dark">
                <h5 class="mb-0">All Courses</h5>
            </div>
            <div class="card-body p-0">
                <table class="table table-hover table-bordered mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Code</th>
                            <th>Name</th>
                            <th>Department</th>
                            <th>Credits</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="course : ${courses}">
                            <td th:text="${course.id}"></td>
                            <td th:text="${course.code}"></td>
                            <td th:text="${course.name}"></td>
                            <td th:text="${course.department}"></td>
                            <td th:text="${course.credits}"></td>
                            <td class="text-center">
                                <a th:href="@{/admin/courses/edit/{id}(id=${course.id})}" class="btn btn-sm btn-outline-primary me-2">
                                    <i class="bi bi-pencil-square"></i> Edit
                                </a>
                                <form th:action="@{/admin/courses/delete/{id}(id=${course.id})}" method="post" class="d-inline"
                                      onsubmit="return confirm('Are you sure you want to delete this course?');">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i> Delete
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${courses.empty}">
                            <td colspan="6" class="text-center py-4 text-muted">No courses found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Scripts Fragment -->
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
