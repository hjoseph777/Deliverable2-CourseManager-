# QA Profile — MySQL via Docker
# Environment variables injected from docker-compose.yml override these defaults

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/coursedb?allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:cmsuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:cmspassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# H2 console disabled in QA
spring.h2.console.enabled=false

server.port=8080
