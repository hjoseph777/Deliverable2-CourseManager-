version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: cms-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: coursedb
      MYSQL_USER: cmsuser
      MYSQL_PASSWORD: cmspassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: cms-app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: qa
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/coursedb?allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: cmsuser
      SPRING_DATASOURCE_PASSWORD: cmspassword
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

volumes:
  mysql_data:
